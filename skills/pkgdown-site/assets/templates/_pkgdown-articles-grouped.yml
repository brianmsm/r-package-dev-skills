# Grouped pkgdown configuration (articles grouped for index + navbar)
# Save as: _pkgdown.yml
#
# Replace:
# - <user-or-org> and <repo> in `url`
# - (optional) edit section titles and patterns to match your vignette/article names
#
# Notes:
# - `articles:` controls BOTH the articles index and (optionally) the Articles dropdown.
# - Each article name is the path under `vignettes/` without extension.
#   Example: vignettes/pizza/slice.Rmd -> pizza/slice
# - A vignette with the same name as the package becomes a top-level "Get started" link by default.
#   If you want "Get started" inside Articles instead, see the optional variant below.
# - Tutorials are optional. Add `tutorials` to navbar only if tutorials are configured/hosted.
# - For large function APIs, add a grouped `reference:` block from
#   `assets/templates/_pkgdown-reference-grouped.yml`.

url: https://<user-or-org>.github.io/<repo>/

template:
  bootstrap: 5

# Optional: improve home page metadata for search engines and landing clarity.
# home:
#   title: "An R package for <short searchable topic>"
#   description: >
#     One paragraph describing what the package does and why it exists.
#   links:
#     - text: Roadmap
#       href: ROADMAP.html
#     - text: Changelog
#       href: news/index.html

navbar:
  structure:
    # Default:
    left:  [intro, reference, articles, news]
    # If you prefer "Get started" to appear under Articles (not top-level),
    # omit `intro` to remove the top-level "Get started" link from the navbar.
    # replace the `left:` line above with:
    # left:  [reference, articles, news]
    #
    # If you embed hosted tutorials, replace the `left:` line above with:
    # left:  [intro, reference, articles, tutorials, news]
    right: [search, github]

  # Optional explicit GitHub component (if not auto-detected):
  # components:
  #   github:
  #     icon: fa-github
  #     href: https://github.com/<user-or-org>/<repo>

articles:
  - title: Workflows
    desc: >
      End-to-end guides for common tasks. Start here after the quick start.
    navbar: Workflows
    contents:
      - starts_with("workflows-")

  - title: Concepts
    desc: >
      Background concepts, model intuition, and design choices behind workflows.
    navbar: Concepts
    contents:
      - starts_with("concepts-")

  - title: FAQ and troubleshooting
    desc: >
      Common questions, pitfalls, and quick fixes.
    navbar: FAQ
    contents:
      - faq
      - troubleshooting

  - title: Developer
    desc: >
      Notes aimed at contributors and developers. Not required for typical users.
    navbar: Developer
    contents:
      - starts_with("dev-")

  # Special section: "internal" is case sensitive and is NOT shown on the index.
  # Use it to silence warnings about non-user-facing articles.
  - title: internal
    contents:
      - starts_with("internal-")
      - internal/index
