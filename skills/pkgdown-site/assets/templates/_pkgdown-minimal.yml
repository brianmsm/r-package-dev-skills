# Minimal pkgdown configuration
# Save as: _pkgdown.yml
#
# Notes:
# - Replace <user-or-org> and <repo> with your actual GitHub user/org and repo name.
# - Tutorials are optional. Keep `tutorials` in navbar only if you define/host tutorials.
# - If GitHub is not auto-detected, define it explicitly under navbar.components.github.

url: https://<user-or-org>.github.io/<repo>/

template:
  bootstrap: 5

  # Optional: official light/dark mode toggle (Bootstrap 5 + pkgdown)
  # light-switch: true
  # theme: gruvbox-light
  # theme-dark: gruvbox-dark
  # bslib:
  #   # Start with navbar colors only (low-risk)
  #   navbar-light-bg: "#0B5FFF"
  #   navbar-dark-bg:  "#0B1F3B"
  #
  # Optional: keep small CSS tweaks in pkgdown/extra.css (avoid broad resets).
  # Optional: keep analytical outputs neutral/light in dark mode via
  # targeted overrides only. Do not globally restyle all images or plots.

# Optional: improve home page metadata for search engines and landing clarity.
# home:
#   title: "An R package for <short searchable topic>"
#   description: >
#     One paragraph describing what the package does and why it exists.
#   links:
#     - text: Roadmap
#       href: ROADMAP.html
#     - text: Changelog
#       href: news/index.html

navbar:
  structure:
    # Default:
    left:  [intro, reference, articles, news]
    # If you embed hosted tutorials, replace the `left:` line above with:
    # left:  [intro, reference, articles, tutorials, news]
    right: [search, github]

  # Optional explicit GitHub component (if not auto-detected):
  # components:
  #   github:
  #     icon: fa-github
  #     href: https://github.com/<user-or-org>/<repo>
