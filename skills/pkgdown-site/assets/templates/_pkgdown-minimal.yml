# Minimal pkgdown configuration
# Save as: _pkgdown.yml
#
# Notes:
# - Replace <user-or-org> and <repo> with your actual GitHub user/org and repo name.
# - This navbar mirrors pkgdown's documented default structure; remove "tutorials" if you don't use them.
# - If GitHub is not auto-detected, define it explicitly under navbar.components.github.

url: https://<user-or-org>.github.io/<repo>/

template:
  bootstrap: 5

navbar:
  structure:
    left:  [intro, reference, articles, tutorials, news]
    right: [search, github]

# Optional explicit GitHub component:
# navbar:
#   components:
#     github:
#       icon: fa-github
#       href: https://github.com/<user-or-org>/<repo>
