# Publish a pkgdown site using GitHub Pages "Source: GitHub Actions" (artifact-based deploy).
# Save as: .github/workflows/pkgdown-pages-artifact.yaml
#
# GitHub Pages settings required:
# - Settings -> Pages -> Build and deployment -> Source: GitHub Actions
#
# Notes:
# - This pattern does NOT use gh-pages and does NOT commit docs/ to main.
# - It uploads docs/ as a Pages artifact and deploys it with actions/deploy-pages.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

name: pkgdown (publish via Pages artifact)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site into docs/
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4