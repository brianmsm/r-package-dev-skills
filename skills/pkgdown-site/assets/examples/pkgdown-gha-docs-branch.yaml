# GitHub Actions workflow to build and publish a pkgdown site via /docs on the default branch.
# Save as: .github/workflows/pkgdown-docs-branch.yaml
#
# GitHub Pages settings required:
# - Settings -> Pages -> Build and deployment -> Source: Deploy from a branch
# - Branch: main (or master), Folder: /docs
#
# Notes:
# - This pattern commits build artifacts (docs/) to the default branch.
# - Ensure docs/ is tracked by git (not ignored).
# - The push trigger ignores docs/** to avoid loops when only docs/ changes.

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

name: pkgdown (publish via /docs on default branch)

permissions: read-all

jobs:
  build-and-commit-docs:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site into docs/
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Commit docs/ back to default branch
        run: |
          if [ -z "$(git status --porcelain docs)" ]; then
            echo "No changes in docs/ to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A docs
          git commit -m "Update pkgdown site (docs/)"
          git push